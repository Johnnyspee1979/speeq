name: Deploy production to Vercel

# Vervangt de ontbrekende Vercel-GitHub-App-integratie.
# Triggert bij élke push naar main: build via expo + vercel deploy --prod,
# en zet de alias naar speeq-wkb-tool.vercel.app.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

concurrency:
  group: vercel-prod
  cancel-in-progress: false

jobs:
  # Testgate (ADR 0001): main deployt pas nadat backend-tests + typechecks en
  # frontend-checks groen zijn. Zelfde checks als op PR's (checks.yml).
  checks:
    uses: ./.github/workflows/checks.yml

  deploy:
    needs: checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project info
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        id: deploy
        run: |
          URL=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL"

      - name: Alias to speeq-wkb-tool.vercel.app
        run: |
          npx vercel alias set "${{ steps.deploy.outputs.deployment-url }}" speeq-wkb-tool.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
