# CI-testgate — draait op elke PR naar main én als voorwaarde vóór de
# productie-deploy (via workflow_call vanuit deploy-production.yml).
# Besluit: ADR 0001 — "GitHub voor updates" begint met: niets ongetest naar main.
name: checks

on:
  pull_request:
  workflow_call:

jobs:
  backend:
    name: backend-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 24 = lokale dev-versie; backend/package.json eist >=22 omdat
      # @supabase/supabase-js native WebSocket nodig heeft (Railway draait 22
      # via NIXPACKS_NODE_VERSION — hard geleerd op 17 jul '26: een rebuild op
      # oudere Node brak álle requireAuth-routes in productie).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # --forceExit: de suite houdt handles open (zie CLAUDE.md-valkuilen);
      # zonder forceExit blijft de job hangen tot de runner-timeout.
      - name: Tests
        run: npx jest --runInBand --forceExit

  frontend:
    name: frontend-checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 24 = lokale dev-versie. Niet verlagen naar 20: de i18n- en
      # ShareService-tests gebruiken de globale `navigator` (Node ≥21).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npx jest --runInBand --forceExit
