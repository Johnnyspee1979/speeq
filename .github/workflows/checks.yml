# CI-testgate — draait op elke PR naar main én als voorwaarde vóór de
# productie-deploy (via workflow_call vanuit deploy-production.yml).
# Besluit: ADR 0001 — "GitHub voor updates" begint met: niets ongetest naar main.
name: checks

on:
  pull_request:
  workflow_call:

jobs:
  backend:
    name: backend-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # --forceExit: de suite houdt handles open (zie CLAUDE.md-valkuilen);
      # zonder forceExit blijft de job hangen tot de runner-timeout.
      - name: Tests
        run: npx jest --runInBand --forceExit

  frontend:
    name: frontend-checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npx jest --runInBand --forceExit
