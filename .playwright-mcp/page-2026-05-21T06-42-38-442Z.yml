      - heading "Uw eigen database. Niet bij uw concurrenten." [level=2] [ref=e103]:
        - text: Uw eigen database.
        - text: Niet bij uw concurrenten.
      - paragraph [ref=e104]: De meeste Wkb-tools bouwen op gedeelde Postgres-databases. Uw data zit in dezelfde tabel als die van uw concurrenten — gescheiden door filterregels. Werkt prima zolang het werkt.
      - paragraph [ref=e105]: SpeeQ levert elke klant een eigen Supabase-database in Frankfurt. Fysiek apart. Geen gedeelde tabellen. Inbegrepen in de standaardprijs.
      - paragraph [ref=e106]: Voor de meeste aannemers maakt dat in het dagelijkse werk geen verschil. Voor de keer dat een verzekeraar of opdrachtgever erom vraagt — dan is die vraag in drie minuten beantwoord.
      - paragraph [ref=e107]: Het verschil is een bankvak versus een eigen kluis. Iedereen zit in hetzelfde gebouw, maar in zijn eigen ruimte.
