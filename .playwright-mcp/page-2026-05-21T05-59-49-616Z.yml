    - heading "Excel, WhatsApp, donderdagavond." [level=2] [ref=e43]
    - paragraph [ref=e44]: "Sinds januari 2024 moet u Wkb-bewijslast aanleveren bij elk bouwproject in Gevolgklasse 1. Tussen tachtig en tweehonderdvijftig vastleggingen per project: foto's, GPS, weer, akkoord, vaak een handtekening van de klant."
    - paragraph [ref=e45]: Zonder tool wordt dat handmatig bijgehouden in Excel, Dropbox en WhatsApp-groepen. Werkvoorbereiders zijn er uren per week aan kwijt. Foto's raken zoek. Eén uitvraag van een verzekeraar — en het dossier blijkt onvolledig.
