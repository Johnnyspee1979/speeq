<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="theme-color" content="#A40D2F" />
    <title>WKB Snap & Sync</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WKB Snap" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <style>
      /* Globale scroll fix voor React Native Web op mobiel */
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
      }

      /* Alle React Native scroll containers scrollbaar maken op mobiel */
      div[style*="overflow: hidden"] {
        overflow: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      /* React Native Web scroll views */
      [data-focusable],
      .r-overflow-hidden {
        -webkit-overflow-scrolling: touch;
      }

      /* Scroll containers */
      [class*="scrollView"],
      [class*="ScrollView"] {
        overflow: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }

      /* Voorkom dubbele scrollbars op desktop */
      @media (min-width: 768px) {
        ::-webkit-scrollbar {
          width: 6px;
        }
        ::-webkit-scrollbar-track {
          background: #111;
        }
        ::-webkit-scrollbar-thumb {
          background: #333;
          border-radius: 3px;
        }
      }

      /* Touch verbetering */
      * {
        -webkit-tap-highlight-color: rgba(232, 80, 10, 0.2);
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <noscript>Je browser ondersteunt geen JavaScript.</noscript>
    <div id="root"></div>
    <!-- Service Worker registratie -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(reg) { console.log('[SW] geregistreerd:', reg.scope); })
            .catch(function(err) { console.warn('[SW] registratie mislukt:', err); });
        });
      }
    </script>
  </body>
</html>
