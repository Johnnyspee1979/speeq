<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="theme-color" content="#A40D2F" />
    <title>SpeeQ WKB — Borgingsdossier</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SpeeQ WKB" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Sprint 9 — UI UX Pro Max typography: Fira Sans (body) + Fira Code (heading/mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700;900&display=swap" />

    <style>
      /* ──────────────────────────────────────────────────────────
         Sprint 9 — UI UX Pro Max foundation
         ────────────────────────────────────────────────────────── */

      /* Default font-stack op heel de PWA */
      html, body, #root, button, input, textarea, select {
        font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      }

      /* Globale scroll fix voor React Native Web op mobiel */
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #020617; /* slate-950 — sluit aan bij darkTheme */
        color: #F8FAFC;
      }

      /* Focus-visible ringen — verplicht voor keyboard nav (WCAG 2.4.7) */
      :focus-visible {
        outline: 2px solid #A40D2F;
        outline-offset: 2px;
        border-radius: 6px;
      }
      *:focus:not(:focus-visible) { outline: none; }

      /* prefers-reduced-motion respect — Framer Motion luistert hier ook naar */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* Cursor pointer op alle clickables (anti-pattern volgens UI UX Pro Max checklist) */
      button, a, [role="button"], [data-pressable="true"] { cursor: pointer; }
      button:disabled, [aria-disabled="true"] { cursor: not-allowed; }

      /* Alle React Native scroll containers scrollbaar maken op mobiel */
      div[style*="overflow: hidden"] {
        overflow: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      /* React Native Web scroll views */
      [data-focusable],
      .r-overflow-hidden {
        -webkit-overflow-scrolling: touch;
      }

      /* Scroll containers */
      [class*="scrollView"],
      [class*="ScrollView"] {
        overflow: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }

      /* Voorkom dubbele scrollbars op desktop */
      @media (min-width: 768px) {
        ::-webkit-scrollbar {
          width: 6px;
        }
        ::-webkit-scrollbar-track {
          background: #111;
        }
        ::-webkit-scrollbar-thumb {
          background: #333;
          border-radius: 3px;
        }
      }

      /* Touch verbetering */
      * {
        -webkit-tap-highlight-color: rgba(232, 80, 10, 0.2);
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <noscript>Je browser ondersteunt geen JavaScript.</noscript>
    <div id="root"></div>
    <!-- Service Worker registratie -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(reg) { console.log('[SW] geregistreerd:', reg.scope); })
            .catch(function(err) { console.warn('[SW] registratie mislukt:', err); });
        });
      }
    </script>
  </body>
</html>
