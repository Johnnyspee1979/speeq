<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=./frontend/dist/" />
    <title>Wkb Snap & Sync</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, #f6c778 0, #f6c778 18%, transparent 18%),
          linear-gradient(160deg, #fff7eb 0%, #f4efe7 45%, #e8f2f4 100%);
        color: #112031;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(640px, 100%);
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(17, 32, 49, 0.08);
        border-radius: 24px;
        box-shadow: 0 18px 60px rgba(17, 32, 49, 0.12);
        padding: 28px;
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.5;
      }

      code,
      pre {
        font-family: "SFMono-Regular", "Consolas", monospace;
      }

      pre {
        background: #112031;
        color: #f5f8fb;
        border-radius: 16px;
        padding: 16px;
        overflow: auto;
      }

      a {
        color: #005f73;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Wkb Snap & Sync</h1>
      <p>Je wordt nu doorgestuurd naar de lokale web-build van de tool.</p>
      <p>Als je Live Server nog op de oude inhoud staat, stop hem dan even en klik daarna opnieuw op <code>Go Live</code>.</p>
      <pre>cd backend && npm start
klik daarna opnieuw op Go Live</pre>
      <p><a href="./frontend/dist/">Open de tool handmatig</a></p>
    </main>
    <script>
      window.location.replace("./frontend/dist/");
    </script>
  </body>
</html>
